name: Build newflasher

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc g++ mingw-w64 zlib1g-dev libexpat1-dev

      - name: Build Windows executable
        run: |
          make clean || true
          make newflasher.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: newflasher-windows
          path: newflasher.exe
